version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: chat_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - chat-net

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - chat-net

  # RocketMQ NameServer
  namesrv:
    image: apache/rocketmq:5.1.4
    container_name: chat-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - chat-net

  # RocketMQ Broker
  broker:
    image: apache/rocketmq:5.1.4
    container_name: chat-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: "namesrv:9876"
    volumes:
      - broker-data:/home/rocketmq/logs
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    depends_on:
      - namesrv
    networks:
      - chat-net

  # 你的聊天应用
  chat-app:
    build: .
    container_name: chat-server
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - broker
    environment:
    # 可以通过环境变量覆盖 config.yaml 里的配置
    # 注意：需要修改 pkg/config 支持环境变量绑定，这里假设 config.yaml 已配置好 Docker 网络内的 Host
    volumes:
      - ./configs:/root/configs # 挂载配置文件，方便修改
      - ./logs:/root/logs
    networks:
      - chat-net

volumes:
  mysql-data:
  redis-data:
  broker-data:

networks:
  chat-net:
    driver: bridge